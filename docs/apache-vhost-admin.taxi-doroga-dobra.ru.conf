# Админ-кабинет Next.js: admin.taxi-doroga-dobra.ru → 127.0.0.1:3002
# Перед SSL: a2ensite + certbot --apache -d admin.taxi-doroga-dobra.ru

<VirtualHost *:80>
    ServerName admin.taxi-doroga-dobra.ru

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3002/
    ProxyPassReverse / http://127.0.0.1:3002/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    ErrorLog ${APACHE_LOG_DIR}/admin.taxi-doroga-dobra.ru-error.log
    CustomLog ${APACHE_LOG_DIR}/admin.taxi-doroga-dobra.ru-access.log combined
</VirtualHost>
