# Клиентский кабинет Next.js: cabinet.taxi-doroga-dobra.ru → 127.0.0.1:3001
# Перед SSL: a2ensite + certbot --apache -d cabinet.taxi-doroga-dobra.ru

<VirtualHost *:80>
    ServerName cabinet.taxi-doroga-dobra.ru

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    ErrorLog ${APACHE_LOG_DIR}/cabinet.taxi-doroga-dobra.ru-error.log
    CustomLog ${APACHE_LOG_DIR}/cabinet.taxi-doroga-dobra.ru-access.log combined
</VirtualHost>
