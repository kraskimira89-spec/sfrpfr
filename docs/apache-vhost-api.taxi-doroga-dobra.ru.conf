# API SFRFR: api.taxi-doroga-dobra.ru → uvicorn 127.0.0.1:8011

<VirtualHost *:80>
    ServerName api.taxi-doroga-dobra.ru

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8011/
    ProxyPassReverse / http://127.0.0.1:8011/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    ErrorLog ${APACHE_LOG_DIR}/api.taxi-doroga-dobra.ru-error.log
    CustomLog ${APACHE_LOG_DIR}/api.taxi-doroga-dobra.ru-access.log combined
</VirtualHost>
