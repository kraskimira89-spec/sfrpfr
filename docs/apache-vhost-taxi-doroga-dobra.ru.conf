# Витрина SFRFR: taxi-doroga-dobra.ru
# DocumentRoot: /var/www/taxi-doroga-dobra

<VirtualHost *:80>
    ServerName taxi-doroga-dobra.ru
    ServerAlias www.taxi-doroga-dobra.ru
    DocumentRoot /var/www/taxi-doroga-dobra

    <Directory /var/www/taxi-doroga-dobra>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/taxi-doroga-dobra.ru-error.log
    CustomLog ${APACHE_LOG_DIR}/taxi-doroga-dobra.ru-access.log combined
</VirtualHost>
