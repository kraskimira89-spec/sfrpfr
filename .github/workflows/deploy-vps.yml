name: deploy-vps

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS /opt/sfrfr
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            APP_DIR="${APP_DIR:-/opt/sfrfr}"
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Каталог $APP_DIR не инициализирован. Сначала выполните scripts/vps_bootstrap.sh на VPS."
              exit 1
            fi
            sudo APP_DIR="$APP_DIR" BRANCH=main bash "$APP_DIR/scripts/vps_deploy.sh"
